services:
  api:
    build: .
    ports:
      # Override host port if 8000 is taken: API_PORT=8001 docker compose up --build
      - "${API_PORT:-8000}:8000"
    environment:
      MODEL_PATH: /app/artifacts/model.pt
      ALLOW_UNTRAINED: "0"
    volumes:
      - ./artifacts:/app/artifacts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
