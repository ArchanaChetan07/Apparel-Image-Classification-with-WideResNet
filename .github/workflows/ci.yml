name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint · Test · Smoke train
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU PyTorch + project deps
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Ruff lint
        run: ruff check apparel_classifier tests

      - name: Pytest
        run: pytest tests/ -v --tb=short --cov=apparel_classifier --cov-report=term-missing

      - name: Smoke train (narrow)
        run: |
          python -m apparel_classifier.train \
            --narrow --subset-size 128 --epochs 1 --batch-size 32 \
            --artifacts-dir artifacts --data-dir data
          test -f artifacts/model_narrow.pt
